name: Deploy to Yandex Cloud

on:
  push:
    branches: [ main ]   # или ваша основная ветка

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true   # подтягиваем тему PaperMod, если она подключена как субмодуль

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3.0.0
      with:
        hugo-version: '0.155.2'
        extended: true

    - name: Build site
      run: hugo --minify

    - name: Upload to Yandex Cloud
  uses: yc-actions/yc-obj-storage-upload@v2
  with:
    bucket: burachevskiy.ru
    access-key: ${{ secrets.YC_ACCESS_KEY_ID }}
    secret-key: ${{ secrets.YC_SECRET_ACCESS_KEY }}
    path: public
    grant: public-read
    endpoint: storage.yandexcloud.net
    region: ru-central1
    delete: true